<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App - Bu Wardono</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="app">
        <!-- Dark Mode Toggle -->
        <div class="dark-mode-toggle">
            <button id="dark-mode-btn">🌙</button>
        </div>

        <!-- Home Page -->
        <section id="home" class="page active">
            <header>
                <div class="banner">
                    <h1 class="animated-title">Selamat Datang di <span class="highlight">Toko Bu Wardono</span></h1>
                    <p class="animated-subtitle">Food and Beverage Terbaik</p>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Cari produk..." id="search-input">
                    <button id="search-btn" class="ripple">Cari</button>
                </div>
            </header>
            <main>
                <h2>Produk Terbaru</h2>
                <div id="product-list" class="product-list">
                    <!-- Products will be loaded here -->
                </div>
            </main>
        </section>

        <!-- Mitra Page -->
        <section id="mitra" class="page">
            <header>
                <h1>Mitra Kami</h1>
            </header>
            <main>
                <div id="mitra-list" class="mitra-list">
                    <!-- Mitra will be loaded here -->
                </div>
            </main>
        </section>

        <!-- Produk Page -->
        <section id="produk" class="page">
            <header>
                <h1>Produk</h1>
                <div class="filter">
                    <select id="category-filter">
                        <option value="">Semua Kategori</option>
                        <option value="FOOD">Food</option>
                        <option value="BEVERAGE">Beverage</option>
                    </select>
                </div>
            </header>
            <main>
                <div id="produk-grid" class="produk-grid">
                    <!-- Products will be loaded here -->
                </div>
            </main>
        </section>

        <!-- Favorit Page -->
        <section id="favorit" class="page">
            <header>
                <h1>Favorit</h1>
            </header>
            <main>
                <div id="favorit-list" class="favorit-list">
                    <!-- Favorit products will be loaded here -->
                </div>
            </main>
        </section>

        <!-- Keranjang Page -->
        <section id="keranjang" class="page">
            <header>
                <h1>Keranjang</h1>
            </header>
            <main>
                <div id="keranjang-list" class="keranjang-list">
                    <!-- Keranjang items will be loaded here -->
                </div>
                <button id="checkout-btn" class="checkout-btn ripple">Checkout</button>
            </main>
        </section>

        <!-- Akun Page -->
        <section id="akun" class="page">
            <header>
                <h1>Akun</h1>
            </header>
            <main>
                <div id="login-form" class="auth-form">
                    <h2>Login</h2>
                    <input type="email" placeholder="Email" id="login-email">
                    <input type="password" placeholder="Password" id="login-password">
                    <button id="login-btn" class="ripple">Login</button>
                    <p>Belum punya akun? <a href="#" id="show-register">Daftar</a></p>
                </div>
                <div id="register-form" class="auth-form hidden">
                    <h2>Register</h2>
                    <input type="text" placeholder="Nama" id="register-name">
                    <input type="email" placeholder="Email" id="register-email">
                    <input type="password" placeholder="Password" id="register-password">
                    <button id="register-btn" class="ripple">Daftar</button>
                    <p>Sudah punya akun? <a href="#" id="show-login">Login</a></p>
                </div>
                <div id="profile" class="profile hidden">
                    <h2>Profil</h2>
                    <p>Nama: <span id="user-name"></span></p>
                    <p>Email: <span id="user-email"></span></p>
                    <button id="logout-btn" class="ripple">Logout</button>
                </div>
            </main>
        </section>

        <!-- Detail Produk Modal -->
        <div id="product-detail" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <img id="detail-image" src="" alt="">
                <h2 id="detail-name"></h2>
                <p id="detail-price"></p>
                <p id="detail-stock"></p>
                <p id="detail-category"></p>
                <button id="add-to-cart-detail" class="add-to-cart-btn ripple">Tambah ke Keranjang</button>
                <button id="favorite-detail" class="favorite-btn ripple">❤️ Favorit</button>
            </div>
        </div>

        <!-- Detail Mitra Modal -->
        <div id="mitra-detail" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="mitra-detail-name"></h2>
                <p>Owner: <span id="mitra-owner"></span></p>
                <p>Email: <span id="mitra-email"></span></p>
                <p>Alamat: <span id="mitra-address"></span></p>
                <p>Kategori: <span id="mitra-kategori"></span></p>
                <p>Sekolah: <span id="mitra-sekolah"></span></p>
            </div>
        </div>

        <!-- Debug Panel (hidden by default) -->
        <div id="debug-panel" class="debug-panel hidden">
            <h3>Debug Information</h3>
            <div id="debug-content"></div>
            <button onclick="document.getElementById('debug-panel').classList.add('hidden')">Close Debug</button>
        </div>

        <!-- Debug Toggle Button -->
        <button id="debug-toggle" class="debug-toggle" onclick="toggleDebugPanel()">🐛</button>
    </div>
    <script src="JS/script.js"></script>
</body>
</html>
